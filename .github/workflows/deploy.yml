name: Deploy Dropread

on:
  push:
    branches:
      - main

jobs:
  build-base:
    name: Build base image if deps changed
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Check if deps changed
        id: cache-check
        uses: actions/cache@v4
        with:
          path: .deps-hash
          key: deps-${{ hashFiles('pyproject.toml', 'uv.lock') }}

      - uses: docker/login-action@v3
        if: steps.cache-check.outputs.cache-hit != 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3
        if: steps.cache-check.outputs.cache-hit != 'true'

      - uses: docker/build-push-action@v6
        if: steps.cache-check.outputs.cache-hit != 'true'
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: ghcr.io/r0gue-a5h/dropread-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save deps hash
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: touch .deps-hash

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: build-base
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run tests
        env:
          APP_ENV: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: test
          SECRET_KEY: test-secret-key-for-ci-only
          GROQ_API_KEY: test
          SERPER_API_KEY: test
          RESEND_API_KEY: test
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test
          APP_URL: http://localhost:8000
          ALLOWED_ORIGINS: http://localhost:8000
          TRANSFORMERS_OFFLINE: "0"
          HF_HUB_OFFLINE: "0"
        run: uv run pytest tests/ -v --tb=short

  migrate:
    name: Run database migrations
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Restore cached virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        run: uv sync

      - name: Run Alembic migrations
        run: DATABASE_URL=${{ secrets.DATABASE_URL }} uv run alembic upgrade head

  deploy:
    name: Deploy to AWS EC2 server
    runs-on: ubuntu-latest
    needs: migrate
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            cd ~/app

            echo "Pulling latest code..."
            git pull origin main

            echo "Pulling base image..."
            sudo docker pull ghcr.io/r0gue-a5h/dropread-base:latest

            echo "Building and restarting Docker containers..."
            sudo docker compose up -d --build

            echo "Cleaning up unused Docker resources..."
            sudo docker image prune -f