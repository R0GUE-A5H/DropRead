services:
  web:
    build: .
    container_name: newsletter-app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1800M
    env_file:
      - .env.production
    environment:
      - APP_ENV=production
    expose:
      - "8000"
  
  nginx:
    image: nginx:alpine
    container_name: newsletter-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web