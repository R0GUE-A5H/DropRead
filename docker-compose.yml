services:
  web:
    build: .
    container_name: newsletter-app
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1800M
    env_file:
      - .env.production
    environment:
      - APP_ENV=production
    expose:
      - "8000"
  
  caddy:
    image: caddy:latest
    container_name: newsletter-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  caddy_data:
  caddy_config: