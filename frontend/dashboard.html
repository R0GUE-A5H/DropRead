<!DOCTYPE html>
<html lang="en" class="h-full bg-white selection:bg-slate-900 selection:text-white">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropRead | My Digests</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap"
        rel="stylesheet">

    <style>
        [x-cloak] {
            display: none !important;
        }

        body {
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.011em;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .bg-grid {
            background-image: radial-gradient(circle at 1px 1px, #f1f5f9 1.5px, transparent 0);
            background-size: 32px 32px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>

<body class="h-full antialiased bg-grid text-slate-900"
    x-data="{ drawerOpen: {{ 'true' if topic else 'false' }}, modalOpen: false, userMenuOpen: false }">

    <header class="fixed top-0 inset-x-0 z-40 bg-white/80 backdrop-blur-md border-b border-slate-200/50">
        <nav class="max-w-7xl mx-auto px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2.5 cursor-pointer" onclick="window.location.href='/'">
                    <div class="h-6 w-6 bg-slate-900 rounded-md flex items-center justify-center shadow-sm">
                        <svg class="h-3.5 w-3.5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                            stroke-width="3.5">
                            <path d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </div>
                    <span class="font-extrabold text-sm tracking-tighter uppercase">DropRead</span>
                </div>
                <div class="h-4 w-px bg-slate-200 mx-1"></div>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">My Digests</span>
            </div>

            <div class="flex items-center gap-4">
                <div class="relative flex items-center gap-3">
                    <div class="text-right hidden sm:block">
                        <p class="text-[10px] font-bold text-slate-900 leading-none">{{ user.name }}</p>
                        <p class="text-[8px] text-green-500 font-bold uppercase tracking-widest mt-1">Online</p>
                    </div>
                    <button @click="userMenuOpen = !userMenuOpen" @click.away="userMenuOpen = false"
                        class="focus:outline-none">
                        <img src="{{ user.picture }}" referrerpolicy="no-referrer"
                            class="w-8 h-8 rounded-full border border-slate-200 shadow-sm hover:ring-2 hover:ring-slate-900 transition-all">
                    </button>
                    <div x-show="userMenuOpen" x-cloak x-transition
                        class="absolute right-0 top-12 w-48 bg-white rounded-xl border border-slate-200 shadow-xl py-2 z-50">
                        <div class="px-4 py-2 border-b border-slate-50 mb-1">
                            <p class="text-[9px] font-bold text-slate-400 lowercase tracking-tighter truncate">{{
                                user.email }}</p>
                        </div>
                        <a href="/dashboard"
                            class="block px-4 py-2 text-xs font-semibold text-slate-700 hover:bg-slate-50">Dashboard</a>
                        <a href="/profile"
                            class="block px-4 py-2 text-xs font-semibold text-slate-700 hover:bg-slate-50">Profile</a>
                        <hr class="my-1 border-slate-100">
                        <a href="/logout"
                            class="block px-4 py-2 text-xs font-bold text-red-600 hover:bg-red-50">Logout</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto px-6 lg:px-8 pt-24 pb-12">
        <div class="flex items-end justify-between mb-12">
            <div>
                <h1 class="text-3xl font-black tracking-tight text-slate-900">My Topics</h1>
                <p class="text-sm font-medium text-slate-500 mt-1">Your active research topics.</p>
            </div>
            <button @click="drawerOpen = true"
                class="bg-slate-900 text-white px-5 py-2.5 rounded-xl font-bold text-xs hover:bg-slate-800 transition active:scale-95 shadow-2xl shadow-slate-200 flex items-center gap-2.5">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                    <path d="M12 4.5v15m7.5-7.5h-15" />
                </svg>
                Add Topic
            </button>
        </div>

        <div class="bg-white border border-slate-200 rounded-[2.5rem] shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50/40 border-b border-slate-100">
                        <th class="pl-10 pr-6 py-5 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Topic
                        </th>
                        <th class="px-6 py-5 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Last Digest
                        </th>
                        <th class="px-6 py-5 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Next
                            Delivery</th>
                        <th class="px-6 py-5 text-[10px] font-bold text-slate-400 uppercase tracking-widest">Status</th>
                        <th
                            class="pl-6 pr-10 py-5 text-[10px] font-bold text-slate-400 uppercase tracking-widest text-right">
                            Action</th>
                    </tr>
                </thead>
                <tbody id="digest-tbody" class="divide-y divide-slate-200">
                    {% for item in items %}
                    {% include "partials/status_badge.html" %}
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </main>

    <div x-show="drawerOpen" x-cloak class="fixed inset-0 z-50 overflow-hidden">
        <div x-show="drawerOpen" x-transition:enter="transition-opacity ease-linear duration-300"
            x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
            x-transition:leave="transition-opacity ease-linear duration-300" x-transition:leave-start="opacity-100"
            x-transition:leave-end="opacity-0" class="absolute inset-0 bg-slate-900/10 backdrop-blur-sm"
            @click="drawerOpen = false"></div>
        <div class="fixed inset-y-0 right-0 flex max-w-full pl-10">
            <div x-show="drawerOpen" x-transition:enter="transform transition ease-in-out duration-400"
                x-transition:enter-start="translate-x-full" x-transition:enter-end="translate-x-0"
                x-transition:leave="transform transition ease-in-out duration-400"
                x-transition:leave-start="translate-x-0" x-transition:leave-end="translate-x-full"
                class="w-screen max-w-md">
                <div class="flex h-full flex-col bg-white shadow-2xl border-l border-slate-200">
                    <div class="px-8 py-10">
                        <div class="flex items-start justify-between">
                            <h2 class="text-2xl font-black text-slate-900 tracking-tight">Add Topic</h2>
                            <button @click="drawerOpen = false" class="text-slate-400 hover:text-slate-900 transition">
                                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                    stroke-width="2.5">
                                    <path d="M6 18L18 6M6 6l12 12" />
                                </svg>
                            </button>
                        </div>
                        <form hx-post="/api/pipeline/init" hx-target="#digest-tbody" hx-swap="afterbegin"
                            @submit="drawerOpen = false" class="mt-12 space-y-10">
                            <div>
                                <label
                                    class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] block mb-4">Topic</label>
                                <input type="text" name="topic" value="{{topic}}" required
                                    placeholder="e.g. RISC-V Power Optimization"
                                    class="w-full px-5 py-4 rounded-xl bg-slate-50 border border-slate-200 text-sm font-bold focus:ring-2 focus:ring-slate-900 focus:outline-none transition">
                            </div>
                            <div>
                                <label
                                    class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] block mb-4">How
                                    often?</label>
                                <div class="grid grid-cols-2 gap-4">
                                    <select name="frequency"
                                        class="appearance-none w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold uppercase tracking-widest focus:ring-2 focus:ring-slate-900 focus:outline-none transition">
                                        <option>Weekly</option>
                                        <option>Daily</option>
                                    </select>
                                    <input name="time" type="time" value="08:00"
                                        class="w-full px-5 py-4 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold focus:ring-2 focus:ring-slate-900 focus:outline-none transition">
                                </div>
                            </div>
                            <button type="submit"
                                class="w-full bg-slate-900 text-white py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-slate-800 transition shadow-xl shadow-slate-200">Start
                                researching</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
