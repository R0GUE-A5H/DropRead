<!DOCTYPE html>
<html lang="en" class="h-full bg-white selection:bg-slate-900 selection:text-white">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropRead| Digest View</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        [x-cloak] {
            display: none !important;
        }

        body {
            font-family: 'Inter', sans-serif;
            letter-spacing: -0.011em;
        }

        .bg-grid {
            background-image: radial-gradient(circle at 1px 1px, #f1f5f9 1.5px, transparent 0);
            background-size: 32px 32px;
        }

        /* Narrative spacing */
        .digest-content p {
            margin-bottom: 1.75rem;
            line-height: 1.8;
            color: #334155;
            font-size: 1.05rem;
        }
    </style>
</head>

<body class="h-full antialiased bg-grid text-slate-900" x-data="{ tooltip: null }">

    <main class="max-w-3xl mx-auto px-6 py-16 animate-in fade-in duration-700">

        <nav class="mb-12">
            <a href="/dashboard"
                class="group inline-flex items-center gap-2 text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400 hover:text-slate-900 transition-colors">
                <svg class="h-3 w-3 transition-transform group-hover:-translate-x-0.5" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="4">
                    <path d="M15 19l-7-7 7-7" />
                </svg>
                My Topics
            </a>
        </nav>

        <header class="mb-8">
            <h1 class="text-4xl font-black text-slate-900 tracking-tight mb-3">{{ digest.title }}</h1>
            <p class="text-xs text-slate-500 font-bold uppercase tracking-widest">
                {{digest.created_at.strftime("%b %d, %Y")}} · {{read_time}} min read · <span
                    class="text-slate-900">{{source}} sources</span>
            </p>
        </header>

        <hr class="border-slate-200 mb-10">

        <article class="digest-content prose prose-slate max-w-none mb-16" id="content">
            <div id="raw-content" style="display:none">{{ digest.content }}</div>

        </article>

        <hr class="border-slate-200 mb-12">

        <section class="mb-20">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] mb-8">Sources ({{source}})</h3>

            <div class="space-y-6">
                {% for source in web_info %}
                <div class="flex items-center justify-between group">
                    <div class="flex items-center gap-4">
                        <img src="https://www.google.com/s2/favicons?domain={{ source.domain }}&sz=32"
                            class="w-4 h-4 rounded-sm grayscale group-hover:grayscale-0 transition-all">
                        <div>
                            <p class="text-sm font-bold text-slate-900">{{source.url}}</p>
                            <p class="text-xs text-slate-500">{{source.title}}</p>
                        </div>
                    </div>
                    <a href="{{ source.url }}" target="_blank"
                        class="text-slate-400 hover:text-slate-900 transition-colors">
                        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                            <path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                        </svg>
                    </a>
                </div>
                {% endfor %}
            </div>
        </section>
    </main>
    <script>
        const raw = document.getElementById('raw-content').innerText
        document.getElementById('content').innerHTML = marked.parse(raw)
    </script>

</body>

</html>
